services:

  db:
    container_name: golang-database 
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: golang
      POSTGRES_PASSWORD: golang
      POSTGRES_DB: golang
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    container_name: golang-backend
    image: docker/golang-backend:v1.0.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      SERVER_READ_TIMEOUT: 10s
      SERVER_WRITE_TIMEOUT: 10s

      DB_HOST: db
      DB_PORT: 5432
      DB_USER: golang
      DB_PASSWORD: golang
      DB_NAME: golang
      DB_SSLMODE: disable

      LOG_LEVEL: warn
      LOG_FORMAT: pretty

      JWT_SECRET_KEY: secret
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 168h

      STORAGE_DOCUMENTS_DIR: /app/documents
    volumes:
      - documents:/app/documents
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
  documents:

